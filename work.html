<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alena Portfolio - Work</title>

<link href="https://fonts.googleapis.com/css2?family=Gelasio:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Gelasio', serif;
    background:#0f0f0f;
    color:white;
}

/* HEADER */
.header{
    padding:25px;
    font-size:20px;
}

/* ===== GALLERY ===== */
.gallery{
    column-count:3;
    column-gap:15px;
    padding:20px;
}

.item{
    position:relative;
    margin-bottom:15px;
    break-inside:avoid;
    cursor:pointer;
    overflow:hidden;
}

.item img{
    width:100%;
    display:block;
    transition:0.3s ease;
}

.item:hover img{
    transform:scale(1.03);
    filter:brightness(1.1);
}

/* HOVER INFO */
.hover-info{
    position:absolute;
    bottom:0;
    left:0;
    right:0;

    background:rgba(0,0,0,0.75);
    color:white;

    padding:10px;

    font-size:13px;

    opacity:0;
    transform:translateY(10px);

    transition:0.25s ease;
}

.item:hover .hover-info{
    opacity:1;
    transform:translateY(0);
}

/* ===== VIEWER ===== */
.viewer{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);

    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.viewer img{
    max-width:90%;
    max-height:80%;
}

/* CONTROLS */
.controls{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    gap:10px;
}

button{
    border:none;
    padding:8px 12px;
    cursor:pointer;
    background:white;
    font-family:'Gelasio', serif;
}

</style>
</head>

<body>

<div class="header">Alena’s Portfolio</div>

<!-- ===== GALLERY ===== -->
<div class="gallery">

<div class="item" onclick="openViewer(0)">
<img src="https://i.postimg.cc/3JDJhk8m/Alena-Kim-Labeled-Before-I-Speak-2.jpg">
<div class="hover-info">
<div>Labeled Before I                 Speak</div>
<div>12” x 18”</div>
</div>
</div>

<div class="item" onclick="openViewer(1)">
<img src="https://i.postimg.cc/TPhTk14b/Ornament-Part-2.jpg" alt="Ornament Piece">
<div class="hover-info">
<div>Duality of Holiday</div>
<div>15” x 15”</div>
</div>
</div>

<div class="item" onclick="openViewer(2)">
<img src="https://i.postimg.cc/FHpKW2sh/Ritual-Korean-3.jpg">
<div class="hover-info">
<div>Ritual</div>
<div>8.5” x 11”</div>
</div>
</div>

<div class="item" onclick="openViewer(3)">
<img src="https://i.postimg.cc/ncYVr6mz/Plant-3.jpg">
<div class="hover-info">
<div>Cultivating</div>
<div>12” x 16”</div>
</div>
</div>

<div class="item" onclick="openViewer(4)">
<img src="https://i.postimg.cc/90HVFpFB/Alena-Kim-Preserved-2.jpg">
<div class="hover-info">
<div>Preserved</div>
<div>15” x 15”</div>
</div>
</div>

<div class="item" onclick="openViewer(5)">
<img src="https://i.postimg.cc/zGGNB38Z/Suitcase-Falling-Out-2.jpg">
<div class="hover-info">
<div>Suitcase</div>
<div>12” x 12”</div>
</div>
</div>

<div class="item" onclick="openViewer(6)">
<img src="https://i.postimg.cc/76GYLh18/Organized-2.jpg">
<div class="hover-info">
<div>Organized</div>
<div>15” x 15”</div>
</div>
</div>

</div>

<!-- ===== VIEWER ===== -->
<div class="viewer" id="viewer">

<div class="controls">
<button onclick="prevArt()">‹</button>
<button onclick="nextArt()">›</button>
<button onclick="closeViewer()">✕</button>
</div>

<img id="viewer-img">

</div>

<script>

const artworks = [
"https://i.postimg.cc/3JDJhk8m/Alena-Kim-Labeled-Before-I-Speak-2.jpg",
"https://i.postimg.cc/TPhTk14b/Ornament-Part-2.jpg",
"https://i.postimg.cc/FHpKW2sh/Ritual-Korean-3.jpg",
"https://i.postimg.cc/ncYVr6mz/Plant-3.jpg",
"https://i.postimg.cc/90HVFpFB/Alena-Kim-Preserved-2.jpg",
"https://i.postimg.cc/zGGNB38Z/Suitcase-Falling-Out-2.jpg",
"https://i.postimg.cc/76GYLh18/Organized-2.jpg"
];

let current = 0;

function openViewer(i){
    current = i;
    document.getElementById("viewer").style.display = "flex";
    update();
}

function update(){
    document.getElementById("viewer-img").src = artworks[current];
}

function nextArt(){
    current = (current + 1) % artworks.length;
    update();
}

function prevArt(){
    current = (current - 1 + artworks.length) % artworks.length;
    update();
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}

</script>

</body>
</html>
