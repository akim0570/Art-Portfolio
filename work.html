<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alena Portfolio - Work</title>

<link href="https://fonts.googleapis.com/css2?family=Gelasio:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Gelasio', serif;
    background:#0f0f0f;
    color:white;
}

/* HEADER */

.header{
    padding:25px;
    font-size:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    background:white;
    color:black;
    text-decoration:none;
    padding:8px 14px;
    border-radius:6px;
}

/* GALLERY */

.gallery{
    column-count:3;
    column-gap:15px;
    padding:20px;
}

.item{
    position:relative;
    margin-bottom:15px;
    break-inside:avoid;
    cursor:pointer;
    overflow:hidden;
}

.item img{
    width:100%;
    display:block;
    transition:0.3s ease;
}

.item:hover img{
    transform:scale(1.03);
    filter:brightness(1.05);
}

/* HOVER INFO */

.hover-info{
    position:absolute;
    bottom:0;
    left:0;
    right:0;

    background:rgba(0,0,0,.75);

    padding:12px;

    opacity:0;
    transform:translateY(10px);

    transition:.25s;
}

.item:hover .hover-info{
    opacity:1;
    transform:translateY(0);
}

/* VIEWER */

.viewer{
    display:none;

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.95);

    z-index:999;
}

.viewer-layout{
    width:100%;
    height:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:40px;

    padding:50px;
}

.viewer-image{
    flex:2;
}

.viewer-image img{
    width:100%;
    max-height:85vh;
    object-fit:contain;
}

.viewer-info{
    flex:1;
    max-width:350px;
}

.viewer-info h2{
    font-size:32px;
    margin-bottom:10px;
}

.viewer-size{
    color:#bdbdbd;
    margin-bottom:20px;
}

.viewer-description{
    line-height:1.8;
}

/* CONTROLS */

.controls{
    position:absolute;
    top:20px;
    right:20px;

    display:flex;
    gap:10px;
}

.controls button{
    border:none;
    padding:10px 14px;
    cursor:pointer;
    font-family:'Gelasio', serif;
}

@media(max-width:900px){

.gallery{
    column-count:1;
}

.viewer-layout{
    flex-direction:column;
    overflow:auto;
}

.viewer-info{
    max-width:90%;
}

}

</style>
</head>

<body>

<div class="header">

<div>Alena's Portfolio</div>

<a href="index.html" class="back-btn">
← Home
</a>

</div>

<!-- GALLERY -->

<div class="gallery">

<div class="item" onclick="openViewer(0)">
<img src="https://i.postimg.cc/3JDJhk8m/Alena-Kim-Labeled-Before-I-Speak-2.jpg">
<div class="hover-info">
<strong>Labeled Before I Speak</strong><br>
12” × 18”
</div>
</div>

<div class="item" onclick="openViewer(1)">
<img src="https://i.postimg.cc/TPhTk14b/Ornament-Part-2.jpg">
<div class="hover-info">
<strong>Duality of Holiday</strong><br>
15” × 15”
</div>
</div>

<div class="item" onclick="openViewer(2)">
<img src="https://i.postimg.cc/FHpKW2sh/Ritual-Korean-3.jpg">
<div class="hover-info">
<strong>Ritual</strong><br>
8.5” × 11”
</div>
</div>

<div class="item" onclick="openViewer(3)">
<img src="https://i.postimg.cc/ncYVr6mz/Plant-3.jpg">
<div class="hover-info">
<strong>Cultivating</strong><br>
12” × 16”
</div>
</div>

<div class="item" onclick="openViewer(4)">
<img src="https://i.postimg.cc/90HVFpFB/Alena-Kim-Preserved-2.jpg">
<div class="hover-info">
<strong>Preserved</strong><br>
15” × 15”
</div>
</div>

<div class="item" onclick="openViewer(5)">
<img src="https://i.postimg.cc/zGGNB38Z/Suitcase-Falling-Out-2.jpg">
<div class="hover-info">
<strong>Suitcase</strong><br>
12” × 12”
</div>
</div>

<div class="item" onclick="openViewer(6)">
<img src="https://i.postimg.cc/76GYLh18/Organized-2.jpg">
<div class="hover-info">
<strong>Organized</strong><br>
15” × 15”
</div>
</div>

</div>

<!-- VIEWER -->

<div class="viewer" id="viewer">

<div class="controls">
<button onclick="prevArt()">‹ Previous</button>
<button onclick="nextArt()">Next ›</button>
<button onclick="closeViewer()">✕ Close</button>
</div>

<div class="viewer-layout">

<div class="viewer-image">
<img id="viewer-img">
</div>

<div class="viewer-info">

<h2 id="viewer-title"></h2>

<div class="viewer-size" id="viewer-size"></div>

<p class="viewer-description" id="viewer-description"></p>

</div>

</div>

</div>

<script>

const artworks = [

{
title:"Labeled Before I Speak",
size:"12” × 18”",
img:"https://i.postimg.cc/B6qtfwGK/Name-Tags-2.jpg",
description:"Explores the experience of being judged through stereotypes and assumptions before having the opportunity to speak for oneself."
},

{
title:"Duality of Holiday",
size:"15” × 15”",
img:"https://i.postimg.cc/TPhTk14b/Ornament-Part-2.jpg",
description:"Examines the balance between celebration, tradition, and cultural identity through familiar holiday imagery."
},

{
title:"Ritual",
size:"8.5” × 11”",
img:"https://i.postimg.cc/FHpKW2sh/Ritual-Korean-3.jpg",
description:"Reflects the everyday traditions and customs that connect generations within Korean culture."
},

{
title:"Cultivating",
size:"12” × 16”",
img:"https://i.postimg.cc/ncYVr6mz/Plant-3.jpg",
description:"Uses growth as a metaphor for personal development, identity, and the influence of family roots."
},

{
title:"Preserved",
size:"15” × 15”",
img:"https://i.postimg.cc/90HVFpFB/Alena-Kim-Preserved-2.jpg",
description:"Represents the effort to protect memories, traditions, and cultural connections across time."
},

{
title:"Suitcase",
size:"12” × 12”",
img:"https://i.postimg.cc/zGGNB38Z/Suitcase-Falling-Out-2.jpg",
description:"Explores migration, family history, and the experiences carried from one generation to the next."
},

{
title:"Organized",
size:"15” × 15”",
img:"https://i.postimg.cc/76GYLh18/Organized-2.jpg",
description:"Examines structure, expectations, and the pressure to fit into predefined categories."
}

];

let current = 0;

function openViewer(index){

current = index;

document.getElementById("viewer").style.display = "block";

updateViewer();

}

function updateViewer(){

document.getElementById("viewer-img").src =
artworks[current].img;

document.getElementById("viewer-title").innerText =
artworks[current].title;

document.getElementById("viewer-size").innerText =
artworks[current].size;

document.getElementById("viewer-description").innerText =
artworks[current].description;

}

function nextArt(){

current++;

if(current >= artworks.length){
current = 0;
}

updateViewer();

}

function prevArt(){

current--;

if(current < 0){
current = artworks.length - 1;
}

updateViewer();

}

function closeViewer(){

document.getElementById("viewer").style.display = "none";

}

</script>

</body>
</html>
